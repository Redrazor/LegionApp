<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/pwa-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="LegionApp" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Base meta (per-route values override these via @vueuse/head) -->
    <title>LegionApp — Star Wars: Legion Companion</title>
    <meta name="description" content="Free fan-made companion for Star Wars: Legion. Browse every unit, build and validate armies, track your collection, and look up the rules glossary — mobile-first, installable, works offline." />
    <link rel="canonical" href="https://www.legion-app.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LegionApp" />
    <meta property="og:title" content="LegionApp — Star Wars: Legion Companion" />
    <meta property="og:description" content="Free fan-made companion for Star Wars: Legion. Browse units, build and validate armies, track your collection, and look up the rules glossary." />
    <meta property="og:url" content="https://www.legion-app.com/" />
    <meta property="og:image" content="https://www.legion-app.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LegionApp — Star Wars: Legion Companion" />
    <meta name="twitter:description" content="Free fan-made companion for Star Wars: Legion. Browse units, build & validate armies, track your collection." />
    <meta name="twitter:image" content="https://www.legion-app.com/og-image.png" />

    <!-- JSON-LD: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "LegionApp",
      "url": "https://www.legion-app.com",
      "description": "Fan-made companion app for Star Wars: Legion tabletop miniatures game — browse units, build armies, track your collection.",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      try {
        if (localStorage.getItem('legion-theme') === 'light') document.documentElement.classList.add('light')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
